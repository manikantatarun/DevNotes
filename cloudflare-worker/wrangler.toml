name = "devnotes"
main = "worker.js"
compatibility_date = "2024-01-01"

# Set these secrets via:  npx wrangler secret put GITHUB_CLIENT_SECRET
# or in the Cloudflare dashboard under Workers → your worker → Settings → Variables

[vars]
GITHUB_CLIENT_ID = "Ov23liGfeE9zIi8ekes4"
ALLOWED_ORIGIN   = "https://manikantatarun.github.io"
DATA_REPO_OWNER  = "manikantatarun"
DATA_REPO_NAME   = "devnotes-data"
DATA_REPO_BRANCH = "main"
# GITHUB_CLIENT_SECRET must be added as a secret (not a plain var):
# npx wrangler secret put GITHUB_CLIENT_SECRET

[[kv_namespaces]]
binding = "META_KV"
id = "231ac68fcc8945b3b2a792be840c7cc5"
preview_id = "79255b16a1234e7b85d1843aa22f1eb0"

[triggers]
crons = ["*/1 * * * *"]  # Every 5 minute

[observability]
[observability.logs]
enabled = true
invocation_logs = true